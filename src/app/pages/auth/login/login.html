<div class="container">
    <h2 class="text-center">Login Form</h2>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
        <!-- section to show error msg from backend if form submission fails -->
        <div *ngIf="errorNotification.show" class="text-danger mb-3">
            {{ errorNotification.text }}
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" formControlName="email" required />
            <div *ngIf="email.invalid && (email.dirty || email.touched)" class="text-danger mt-2">
                <div *ngIf="email.errors?.['required']">Email is required.</div>
                <div *ngIf="email.errors?.['email']">
                    Please enter a valid email address.
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" formControlName="password" required />
            <div *ngIf="password.invalid && (password.dirty || password.touched)" class="text-danger mt-2">
                <div *ngIf="password.errors?.['required']">Password is required.</div>
                <div *ngIf="password.errors?.['minlength']">
                    Password must be at least 5 characters long.
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
